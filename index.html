<!-- Excel + Zip engines.
     Load BUNDLED local copies first (js/vendor/) so the app is fully offline-
     capable without any CDN; if those files aren't present, fall back to the CDN.
     The inline checks use document.write during parse to keep load order intact
     so app scripts always see XLSX / JSZip defined. To bundle the libraries,
     run download-offline-libs.ps1 (or see js/vendor/README.txt). -->
<script src="js/vendor/xlsx.full.min.js"></script>
<script>window.XLSX||document.write('<scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/scr'+'ipt>');</script>
<script src="js/vendor/jszip.min.js"></script>
<script>window.JSZip||document.write('<scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"><\/scr'+'ipt>');</script>
<script src="js/vendor/pdf-lib.min.js"></script>
<script>window.PDFLib||document.write('<scr'+'ipt src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"><\/scr'+'ipt>');</script>

  </button>

<div class="layout">
  <nav class="rail" id="rail" aria-label="Tools"></nav>

  <main class="main">
    <div class="dropzone" id="dropzone" tabindex="0" role="button"
         aria-label="Load a UDQ Excel file">
      <div>
        <div class="dz-title" id="dzTitle">Drop a UDQ here</div>
        <div class="dz-sub" id="dzSub">or click to browse for the ATLAS Excel export (.xlsx or .xlsm)</div>
      </div>
      <span class="dz-file hidden" id="dzFile"></span>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xlsm" class="hidden">
    <div class="statusline" id="loadStatus"></div>
    <div id="recentUdqs"></div>

    <div id="dashboard" class="hidden"></div>

    <div id="workspace" class="workspace"></div>
  </main>
</div>
